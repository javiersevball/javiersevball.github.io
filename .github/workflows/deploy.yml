# This workflow will deploy the personal webpage
name: Personal web deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish solution
        run: dotnet publish -c Release

      - name: Copy index.html to 404.html
        run: cp bin/Release/net10.0/publish/wwwroot/index.html bin/Release/net10.0/publish/wwwroot/404.html

      - name: Fix Blazor Entry Point for static pages
        run: cp bin/Release/net10.0/publish/wwwroot/_framework/blazor.webassembly.*.js bin/Release/net10.0/publish/wwwroot/_framework/blazor.webassembly.js

      - name: Add .nojekyll file
        run: touch bin/Release/net10.0/publish/wwwroot/.nojekyll

      - name: Commit and push to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: bin/Release/net10.0/publish/wwwroot
